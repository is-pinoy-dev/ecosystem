name = "tools-analytics"
main = "index.ts"
compatibility_date = "2026-05-27"
workers_dev = false
preview_urls = false

[triggers]
crons = ["0 1 * * *"]

[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "analytics-db"
database_id = "e76f34ea-c2d0-4e5f-995c-d717b87ee221"
migrations_dir = "migrations"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
