name = "tools-analytics"
main = "index.ts"
compatibility_date = "2026-05-27"

[triggers]
crons = ["0 1 * * *"]

[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "analytics-db"
database_id = "PLACEHOLDER"
migrations_dir = "migrations"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
