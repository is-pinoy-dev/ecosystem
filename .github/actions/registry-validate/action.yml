name: Registry Validate
description: >
  Validates subdomain JSON files and posts a PR comment with errors on failure.
  On subsequent pushes, updates the existing comment instead of adding a new one.

inputs:
  dir:
    description: Path to the directory containing subdomain JSON files
    required: false
    default: ./subdomains
  github-token:
    description: GitHub token with pull-requests:write permission.
    required: true
  cloudflare-api-token:
    description: Cloudflare API token. Required to run sync dry-run after validation.
    required: false
  cloudflare-zone-id:
    description: Cloudflare zone ID. Required to run sync dry-run after validation.
    required: false

runs:
  using: composite
  steps:
    - name: Install CLI
      shell: bash
      run: npm install -g @is-pinoy-dev/cli@latest

    - name: Run validation
      id: validate
      shell: bash
      run: |
        set +e
        OUTPUT=$(is-pinoy registry validate --dir "$INPUT_DIR" 2>&1)
        EXIT_CODE=$?
        set -e

        CLEAN=$(printf '%s' "$OUTPUT" | sed 's/\x1b\[[0-9;]*[mGKHFJ]//g')

        DELIM="ghadelimiter_$(head -c 8 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 8)"
        {
          echo "output<<$DELIM"
          printf '%s\n' "$CLEAN"
          echo "$DELIM"
        } >> "$GITHUB_OUTPUT"

        echo "failed=$([ $EXIT_CODE -ne 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      env:
        INPUT_DIR: ${{ inputs.dir }}

    - name: Post failure comment
      if: steps.validate.outputs.failed == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VALIDATION_OUTPUT: ${{ steps.validate.outputs.output }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        {
          printf '## ❌ Subdomain Validation Failed\n\n'
          printf 'The following errors were found:\n\n'
          printf '```\n%s\n```\n\n' "$VALIDATION_OUTPUT"
          printf 'Please fix the errors above and push again.'
        } > /tmp/pr-comment.md
        gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/pr-comment.md --edit-last 2>/dev/null \
          || gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/pr-comment.md || true

    - name: Run sync dry-run
      id: dry-run
      if: steps.validate.outputs.failed == 'false' && inputs.cloudflare-api-token != '' && inputs.cloudflare-zone-id != ''
      shell: bash
      run: |
        set +e
        OUTPUT=$(is-pinoy registry sync --dir "$INPUT_DIR" --dry-run 2>&1)
        set -e

        CLEAN=$(printf '%s' "$OUTPUT" | sed 's/\x1b\[[0-9;]*[mGKHFJ]//g')

        DELIM="ghadelimiter_$(head -c 8 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 8)"
        {
          echo "output<<$DELIM"
          printf '%s\n' "$CLEAN"
          echo "$DELIM"
        } >> "$GITHUB_OUTPUT"
      env:
        INPUT_DIR: ${{ inputs.dir }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ZONE_ID: ${{ inputs.cloudflare-zone-id }}

    - name: Update comment on success
      if: steps.validate.outputs.failed == 'false' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        DRY_RUN_OUTPUT: ${{ steps.dry-run.outputs.output }}
      run: |
        {
          printf '## ✅ Subdomain Validation Passed\n\nAll subdomain files are valid.\n'
          if [ -n "$DRY_RUN_OUTPUT" ]; then
            printf '\n### 🔍 Sync Dry-Run\n\n'
            printf '```\n%s\n```\n' "$DRY_RUN_OUTPUT"
          fi
        } > /tmp/pr-comment.md
        gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/pr-comment.md \
          --edit-last 2>/dev/null || true

    - name: Fail on validation errors
      if: steps.validate.outputs.failed == 'true'
      shell: bash
      run: exit 1
